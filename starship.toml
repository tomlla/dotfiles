# Put this file to ~/.config/starship.toml

# Warning: This config does not include keys that have an unset value

"$schema" = "https://starship.rs/config-schema.json"

# $all is shorthand for $username$hostname$localip$shlvl$singularity$kubernetes$nats$directory$vcsh$fossil_branch$fossil_metrics$git_branch$git_commit$git_state$git_metrics$git_status$hg_branch$hg_state$pijul_channel$docker_context$package$bun$c$cmake$cobol$cpp$daml$dart$deno$dotnet$elixir$elm$erlang$fennel$fortran$gleam$golang$gradle$haskell$haxe$helm$java$julia$kotlin$lua$maven$mojo$nim$nodejs$ocaml$odin$opa$perl$php$pulumi$purescript$python$quarto$raku$rlang$red$ruby$rust$scala$solidity$swift$terraform$typst$vlang$vagrant$xmake$zig$buf$guix_shell$nix_shell$conda$pixi$meson$spack$memory_usage$aws$gcloud$openstack$azure$direnv$env_var$mise$crystal$custom$sudo$cmd_duration$line_break$jobs$battery$time$status$container$netns$os$shell$character
format = "$all"

right_format = ""
continuation_prompt = "[∙](bright-black) "
scan_timeout = 30
command_timeout = 500
add_newline = true
follow_symlinks = true

[palettes]

[profiles]

[aws]
format = 'on [$symbol($profile )(\($region\) )(\[$duration\] )]($style)'
symbol = "☁️  "
style = "bold yellow"
disabled = false
expiration_symbol = "X"
force_display = false

[aws.region_aliases]

[aws.profile_aliases]

[azure]
format = "on [$symbol($subscription)]($style) "
symbol = "󰠅 "
style = "blue bold"
disabled = true

[azure.subscription_aliases]

[battery]
full_symbol = "󰁹 "
charging_symbol = "󰂄 "
discharging_symbol = "󰂃 "
unknown_symbol = "󰂑 "
empty_symbol = "󰂎 "
disabled = false
format = "[$symbol$percentage]($style) "

[[battery.display]]
threshold = 10
style = "red bold"

[buf]
format = "with [$symbol($version )]($style)"
version_format = "v${raw}"
symbol = "🐃 "
style = "bold blue"
disabled = false
detect_extensions = []
detect_files = [
    "buf.yaml",
    "buf.gen.yaml",
    "buf.work.yaml",
]
detect_folders = []

[bun]
format = "via [$symbol($version )]($style)"
version_format = "v${raw}"
symbol = "🥟 "
style = "bold red"
disabled = false
detect_extensions = []
detect_files = [
    "bun.lock",
    "bun.lockb",
    "bunfig.toml",
]
detect_folders = []

[c]
format = "via [$symbol($version(-$name) )]($style)"
version_format = "v${raw}"
style = "149 bold"
symbol = "C "
disabled = false
detect_extensions = [
    "c",
    "h",
]
detect_files = []
detect_folders = []
commands = [
    [
    "cc",
    "--version",
],
    [
    "gcc",
    "--version",
],
    [
    "clang",
    "--version",
],
]

[character]
format = "$symbol "
success_symbol = "[\\$](bold green)"
error_symbol = "[\\$](bold red)"
vimcmd_symbol = "[❮](bold green)"
vimcmd_visual_symbol = "[❮](bold yellow)"
vimcmd_replace_symbol = "[❮](bold purple)"
vimcmd_replace_one_symbol = "[❮](bold purple)"
disabled = false

[claude_context]
format = "[$gauge $percentage]($style) "
symbol = ""
gauge_width = 5
gauge_full_symbol = "█"
gauge_partial_symbol = "▒"
gauge_empty_symbol = "░"
disabled = false

[[claude_context.display]]
threshold = 0.0
style = "bold green"
hidden = true

[[claude_context.display]]
threshold = 30.0
style = "bold green"
hidden = false

[[claude_context.display]]
threshold = 60.0
style = "bold yellow"
hidden = false

[[claude_context.display]]
threshold = 80.0
style = "bold red"
hidden = false

[claude_cost]
format = '[$symbol(\$$cost)]($style) '
symbol = "💰 "
disabled = false

[[claude_cost.display]]
threshold = 0.0
style = "bold green"
hidden = true

[[claude_cost.display]]
threshold = 1.0
style = "bold yellow"
hidden = false

[[claude_cost.display]]
threshold = 5.0
style = "bold red"
hidden = false

[claude_model]
format = "[$symbol$model]($style) "
symbol = "🤖 "
style = "bold blue"
disabled = false

[claude_model.model_aliases]

[cmake]
format = "via [$symbol($version )]($style)"
version_format = "v${raw}"
symbol = "△ "
style = "bold blue"
disabled = false
detect_extensions = []
detect_files = [
    "CMakeLists.txt",
    "CMakeCache.txt",
]
detect_folders = []

[cmd_duration]
min_time = 2000
format = "took [$duration]($style) "
style = "yellow bold"
show_milliseconds = false
disabled = false
show_notifications = false
min_time_to_notify = 45000

[cobol]
format = "via [$symbol($version )]($style)"
version_format = "v${raw}"
symbol = "⚙️ "
style = "bold blue"
disabled = false
detect_extensions = [
    "cbl",
    "cob",
    "CBL",
    "COB",
]
detect_files = []
detect_folders = []

[conda]
truncation_length = 1
format = "via [$symbol$environment]($style) "
symbol = "🅒 "
style = "green bold"
ignore_base = true
detect_env_vars = ["!PIXI_ENVIRONMENT_NAME"]
disabled = false

[container]
format = '[$symbol \[$name\]]($style) '
symbol = "⬢"
style = "red bold dimmed"
disabled = false

[cpp]
format = "via [$symbol($version(-$name) )]($style)"
version_format = "v${raw}"
style = "149 bold"
symbol = "C++ "
disabled = true
detect_extensions = [
    "cpp",
    "cc",
    "cxx",
    "c++",
    "hpp",
    "hh",
    "hxx",
    "h++",
    "tcc",
]
detect_files = []
detect_folders = []
commands = [
    [
    "c++",
    "--version",
],
    [
    "g++",
    "--version",
],
    [
    "clang++",
    "--version",
],
]

[crystal]
format = "via [$symbol($version )]($style)"
version_format = "v${raw}"
symbol = "🔮 "
style = "bold red"
disabled = false
detect_extensions = ["cr"]
detect_files = ["shard.yml"]
detect_folders = []

[daml]
symbol = "Λ "
format = "via [$symbol($version )]($style)"
version_format = "v${raw}"
style = "bold cyan"
disabled = false
detect_extensions = []
detect_files = ["daml.yaml"]
detect_folders = []

[dart]
format = "via [$symbol($version )]($style)"
version_format = "v${raw}"
symbol = "🎯 "
style = "bold blue"
disabled = false
detect_extensions = ["dart"]
detect_files = [
    "pubspec.yaml",
    "pubspec.yml",
    "pubspec.lock",
]
detect_folders = [".dart_tool"]

[deno]
format = "via [$symbol($version )]($style)"
version_format = "v${raw}"
symbol = "🦕 "
style = "green bold"
disabled = false
detect_extensions = []
detect_files = [
    "deno.json",
    "deno.jsonc",
    "deno.lock",
    "mod.ts",
    "deps.ts",
    "mod.js",
    "deps.js",
]
detect_folders = []

[directory]
truncation_length = 3
truncate_to_repo = true
substitutions = []
fish_style_pwd_dir_length = 0
use_logical_path = true
format = "[$path]($style)[$read_only]($read_only_style) "
repo_root_format = "[$before_root_path]($before_repo_root_style)[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style) "
style = "cyan bold"
disabled = false
read_only = "🔒"
read_only_style = "red"
truncation_symbol = ""
home_symbol = "~"
use_os_path_sep = true

[direnv]
format = "[$symbol$loaded/$allowed]($style) "
symbol = "direnv "
style = "bold bright-yellow"
disabled = true
detect_extensions = []
detect_env_vars = ["DIRENV_FILE"]
detect_files = [".envrc"]
detect_folders = []
allowed_msg = "allowed"
not_allowed_msg = "not allowed"
denied_msg = "denied"
loaded_msg = "loaded"
unloaded_msg = "not loaded"

[docker_context]
symbol = "🐳 "
style = "blue bold"
format = "via [$symbol$context]($style) "
only_with_files = true
disabled = false
detect_extensions = []
detect_files = [
    "compose.yml",
    "compose.yaml",
    "docker-compose.yml",
    "docker-compose.yaml",
    "Dockerfile",
]
detect_folders = []

[dotnet]
format = "via [$symbol($version )(🎯 $tfm )]($style)"
version_format = "v${raw}"
symbol = ".NET "
style = "blue bold"
heuristic = true
disabled = false
detect_extensions = [
    "csproj",
    "fsproj",
    "xproj",
]
detect_files = [
    "global.json",
    "project.json",
    "Directory.Build.props",
    "Directory.Build.targets",
    "Packages.props",
]
detect_folders = []

[elixir]
