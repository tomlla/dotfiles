disabled = false

[fortran]
format = "via [$symbol($version(-$name) )]($style)"
version_format = "${raw}"
symbol = "🅵  "
style = "bold purple"
disabled = false
detect_extensions = [
    "f",
    "F",
    "for",
    "FOR",
    "ftn",
    "FTN",
    "f77",
    "F77",
    "f90",
    "F90",
    "f95",
    "F95",
    "f03",
    "F03",
    "f08",
    "F08",
    "f18",
    "F18",
