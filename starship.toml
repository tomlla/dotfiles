[package]
format = "is [$symbol$version]($style) "
symbol = "📦 "
style = "208 bold"
display_private = false
disabled = false
version_format = "v${raw}"

[perl]
format = "via [$symbol($version )]($style)"
version_format = "v${raw}"
symbol = "🐪 "
style = "149 bold"
disabled = false
detect_extensions = [
    "pl",
    "pm",
    "pod",
]
detect_files = [
    "Makefile.PL",
    "Build.PL",
    "cpanfile",
    "cpanfile.snapshot",
    "META.json",
    "META.yml",
    ".perl-version",
]
detect_folders = []

[php]
format = "via [$symbol($version )]($style)"
version_format = "v${raw}"
symbol = "🐘 "
style = "147 bold"
disabled = false
detect_extensions = ["php"]
detect_files = [
    "composer.json",
    ".php-version",
]
detect_folders = []

[pijul_channel]
symbol = " "
style = "bold purple"
format = "on [$symbol$channel]($style) "
truncation_length = 9223372036854775807
truncation_symbol = "…"
disabled = true

[pixi]
pixi_binary = ["pixi"]
show_default_environment = true
format = 'via [$symbol($version )(\($environment\) )]($style)'
version_format = "v${raw}"
symbol = "🧚 "
style = "yellow bold"
disabled = false
detect_extensions = []
detect_files = [
    "pixi.toml",
    "pixi.lock",
]
detect_folders = []

[pulumi]
format = "via [$symbol($username@)$stack]($style) "
version_format = "v${raw}"
symbol = " "
style = "bold 5"
disabled = false
search_upwards = true

[purescript]
format = "via [$symbol($version )]($style)"
version_format = "v${raw}"
symbol = "<=> "
style = "bold white"
disabled = false
detect_extensions = ["purs"]
detect_files = [
    "spago.dhall",
    "spago.yaml",
    "spago.lock",
]
detect_folders = []

[python]
pyenv_version_name = false
pyenv_prefix = "pyenv "
python_binary = [
    ["python"],
    ["python3"],
    ["python2"],
]
format = 'via [${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
version_format = "v${raw}"
style = "yellow bold"
symbol = "🐍 "
disabled = false
detect_extensions = [
    "py",
    "ipynb",
]
detect_files = [
    "requirements.txt",
    ".python-version",
    "pyproject.toml",
    "Pipfile",
    "tox.ini",
    "setup.py",
    "__init__.py",
]
detect_folders = []
detect_env_vars = ["VIRTUAL_ENV"]
generic_venv_names = []

[quarto]
format = "via [$symbol($version )]($style)"
version_format = "v${raw}"
symbol = "⨁ "
style = "bold #75AADB"
disabled = false
detect_extensions = ["qmd"]
detect_files = ["_quarto.yml"]
detect_folders = []

[raku]
format = "via [$symbol($version-$vm_version )]($style)"
version_format = "${raw}"
symbol = "🦋 "
style = "149 bold"
disabled = false
detect_extensions = [
    "p6",
    "pm6",
    "pod6",
    "raku",
    "rakumod",
]
detect_files = ["META6.json"]
detect_folders = []

[red]
format = "via [$symbol($version )]($style)"
version_format = "v${raw}"
symbol = "🔺 "
style = "red bold"
disabled = false
detect_extensions = [
    "red",
    "reds",
]
detect_files = []
detect_folders = []

[rlang]
format = "via [$symbol($version )]($style)"
version_format = "v${raw}"
style = "blue bold"
symbol = "📐 "
disabled = false
detect_extensions = [
    "R",
    "Rd",
    "Rmd",
    "Rproj",
    "Rsx",
]
detect_files = ["DESCRIPTION"]
detect_folders = [".Rproj.user"]

[ruby]
format = "via [$symbol($version )]($style)"
version_format = "v${raw}"
symbol = "💎 "
style = "bold red"
disabled = false
detect_extensions = ["rb"]
detect_files = [
    "Gemfile",
    ".ruby-version",
]
detect_folders = []
detect_variables = [
    "RUBY_VERSION",
    "RBENV_VERSION",
]

[rust]
format = "via [$symbol($version )]($style)"
version_format = "v${raw}"
symbol = "🦀 "
style = "bold red"
disabled = false
detect_extensions = ["rs"]
detect_files = ["Cargo.toml"]
detect_folders = []

[scala]
format = "via [$symbol($version )]($style)"
version_format = "v${raw}"
disabled = false
style = "red bold"
symbol = "🆂 "
detect_extensions = [
    "sbt",
    "scala",
]
detect_files = [
    ".scalaenv",
    ".sbtenv",
    "build.sbt",
]
detect_folders = [".metals"]

[shell]
format = "[$indicator]($style) "
bash_indicator = "bsh"
fish_indicator = "fsh"
zsh_indicator = "zsh"
powershell_indicator = "psh"
ion_indicator = "ion"
elvish_indicator = "esh"
tcsh_indicator = "tsh"
nu_indicator = "nu"
xonsh_indicator = "xsh"
cmd_indicator = "cmd"
unknown_indicator = ""
style = "white bold"
disabled = true

[shlvl]
threshold = 2
format = "[$symbol$shlvl]($style) "
symbol = "↕️  "
repeat = false
repeat_offset = 0
style = "bold yellow"
disabled = true

[singularity]
symbol = ""
format = '[$symbol\[$env\]]($style) '
style = "blue bold dimmed"
disabled = false

[solidity]
format = "via [$symbol($version)]($style)"
version_format = "v${major}.${minor}.${patch}"
disabled = false
style = "bold blue"
symbol = "S "
compiler = ["solc"]
detect_extensions = ["sol"]
detect_files = []
detect_folders = []

[spack]
truncation_length = 1
format = "via [$symbol$environment]($style) "
symbol = "🅢 "
style = "blue bold"
disabled = false

[status]
format = "[$symbol$status]($style) "
symbol = "❌"
success_symbol = ""
not_executable_symbol = "🚫"
not_found_symbol = "🔍"
sigint_symbol = "🧱"
signal_symbol = "⚡"
style = "bold red"
map_symbol = false
recognize_signal_code = true
pipestatus = false
pipestatus_separator = "|"
pipestatus_format = '\[$pipestatus\] => [$symbol$common_meaning$signal_name$maybe_int]($style) '
disabled = true

[sudo]
format = "[as $symbol]($style)"
symbol = "🧙 "
style = "bold blue"
allow_windows = false
disabled = true

[swift]
format = "via [$symbol($version )]($style)"
version_format = "v${raw}"
symbol = "🐦 "
style = "bold 202"
disabled = false
detect_extensions = ["swift"]
detect_files = ["Package.swift"]
detect_folders = []

[terraform]
format = "via [$symbol$workspace]($style) "
version_format = "v${raw}"
symbol = "💠 "
style = "bold 105"
disabled = false
detect_extensions = [
    "tf",
    "tfplan",
    "tfstate",
]
detect_files = []
detect_folders = [".terraform"]
commands = [
    [
    "terraform",
    "version",
],
    [
    "tofu",
    "version",
],
]

[time]
format = "at [$time]($style) "
style = "bold yellow"
use_12hr = false
disabled = true
utc_time_offset = "local"
time_range = "-"

[typst]
format = "via [$symbol($version )]($style)"
version_format = "v${raw}"
symbol = "t "
style = "bold #0093A7"
disabled = false
detect_extensions = ["typ"]
detect_files = ["template.typ"]
detect_folders = []

[username]
detect_env_vars = []
format = "[$user]($style) in "
style_root = "red bold"
style_user = "yellow bold"
show_always = false
disabled = true

[username.aliases]

[vagrant]
format = "via [$symbol($version )]($style)"
version_format = "v${raw}"
symbol = "⍱ "
style = "cyan bold"
disabled = false
detect_extensions = []
detect_files = ["Vagrantfile"]
detect_folders = []

[vcs]
order = [
    "git",
    "hg",
    "pijul",
    "fossil",
]
disabled = false
fossil_modules = "$fossil_branch$fossil_metrics"
git_modules = "$git_branch$git_commit$git_state$git_metrics$git_status"
hg_modules = "$hg_branch$hg_state"
pijul_modules = "$pijul_channel"

[vcsh]
symbol = ""
style = "bold yellow"
format = "vcsh [$symbol$repo]($style) "
disabled = false

[vlang]
format = "via [$symbol($version )]($style)"
version_format = "v${raw}"
symbol = "V "
style = "blue bold"
disabled = false
detect_extensions = ["v"]
detect_files = [
    "v.mod",
    "vpkg.json",
    ".vpkg-lock.json",
]
detect_folders = []

[xmake]
format = "via [$symbol($version )]($style)"
version_format = "v${raw}"
symbol = "△ "
style = "bold green"
disabled = false
detect_extensions = []
detect_files = ["xmake.lua"]
detect_folders = []

[zig]
format = "via [$symbol($version )]($style)"
version_format = "v${raw}"
symbol = "↯ "
style = "bold yellow"
disabled = false
detect_extensions = ["zig"]
detect_files = []
detect_folders = []

