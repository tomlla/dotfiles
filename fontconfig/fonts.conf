<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
  <!--
    LANG=en_US.UTF-8 のため lang=ja ヒントがアプリに渡らず、
    noto-fonts-cjk(OTC)が JP 以外の地域字形(中華系に見える Han)を
    選んでしまう問題への対策。日本語版 Noto を generic family の
    先頭に固定し、地域違いの CJK が要求されても JP へ寄せる。
  -->

  <!--
    generic family の Han 字形を日本語版に固定。
    ラテン字形は従来どおり DejaVu を先に試させ、DejaVu に無い
    Han/かな等で Noto CJK JP に落ちるようにする(英数字の見た目は不変)。
  -->
  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>DejaVu Sans</family>
      <family>Noto Sans CJK JP</family>
    </prefer>
  </alias>
  <alias>
    <family>serif</family>
    <prefer>
      <family>DejaVu Serif</family>
      <family>Noto Serif CJK JP</family>
    </prefer>
  </alias>
  <alias>
    <family>monospace</family>
    <prefer>
      <family>DejaVu Sans Mono</family>
      <family>Noto Sans Mono CJK JP</family>
    </prefer>
  </alias>

  <!--
    SC/TC/KR/HK の Noto CJK が直接要求された場合でも、
    まず JP 版を試させる(JP に無い字形のみ元の地域版へフォールバック)。
  -->
  <match target="pattern">
    <test name="family"><string>Noto Sans CJK SC</string></test>
    <edit name="family" mode="prepend" binding="strong"><string>Noto Sans CJK JP</string></edit>
  </match>
  <match target="pattern">
    <test name="family"><string>Noto Sans CJK TC</string></test>
    <edit name="family" mode="prepend" binding="strong"><string>Noto Sans CJK JP</string></edit>
  </match>
  <match target="pattern">
    <test name="family"><string>Noto Sans CJK HK</string></test>
    <edit name="family" mode="prepend" binding="strong"><string>Noto Sans CJK JP</string></edit>
  </match>
  <match target="pattern">
    <test name="family"><string>Noto Sans CJK KR</string></test>
    <edit name="family" mode="prepend" binding="strong"><string>Noto Sans CJK JP</string></edit>
  </match>
</fontconfig>
